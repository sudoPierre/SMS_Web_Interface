
services:
  db:
    image: mysql:latest
    container_name: sms_database
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sms_db
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: