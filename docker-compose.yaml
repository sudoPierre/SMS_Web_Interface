
services:
  db:
    image: postgres:16-alpine
    container_name: sms_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: sms_db
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d sms_db -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  backend_api:
    build: ./backend_api
    container_name: sms_backend_api
    environment:
      - DB_HOST=db
      - DB_USER=sms_user
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - DB_NAME=sms_db
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./worker
    container_name: sms_worker
    environment:
      - DB_HOST=db
      - DB_USER=sms_user
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - DB_NAME=sms_db
      - DB_PORT=5432
      - SMS_GATEWAY_IP=${SMS_GATEWAY_IP:-192.168.1.63}
      - SMS_GATEWAY_LOGIN=${SMS_GATEWAY_LOGIN:-sms}
      - SMS_GATEWAY_PASSWORD=${SMS_GATEWAY_PASSWORD:-nVVJ-k9a}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: